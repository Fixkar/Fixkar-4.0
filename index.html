<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixKar — Help Is On The Way</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #FF6B00;
      --orange-light: #FF8C38;
      --navy: #1A1A2E;
      --teal: #00D4AA;
      --bg: #0D0D1A;
      --bg2: #16213E;
      --bg3: #1A1A2E;
      --card: #1E2A45;
      --border: rgba(255,255,255,0.08);
      --text: #F8F9FA;
      --text2: #94A3B8;
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1,h2,h3,h4 { font-family: 'Poppins', sans-serif; }

    /* ── APP SHELL ── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn 0.3s ease; }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    /* ── SPLASH ── */
    #splash {
      background: linear-gradient(135deg, #0D0D1A 0%, #1A1A2E 50%, #0D0D1A 100%);
      align-items: center; justify-content: center;
    }
    .splash-logo { text-align: center; }
    .splash-icon {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; margin: 0 auto 20px;
      box-shadow: 0 20px 60px rgba(255,107,0,0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 20px 60px rgba(255,107,0,0.4); }
      50% { box-shadow: 0 20px 80px rgba(255,107,0,0.7); }
    }
    .splash-title { font-size: 42px; font-weight: 800; color: var(--text); letter-spacing: -1px; }
    .splash-title span { color: var(--orange); }
    .splash-tagline { color: var(--text2); margin-top: 8px; font-size: 16px; }
    .splash-bar {
      width: 200px; height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin: 40px auto 0;
      overflow: hidden;
    }
    .splash-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--orange), var(--orange-light));
      border-radius: 99px;
      animation: load 2.5s ease forwards;
    }
    @keyframes load { to { width: 100%; } }

    /* ── ONBOARDING ── */
    #onboarding { background: var(--bg); }
    .onboard-slides { flex: 1; position: relative; overflow: hidden; }
    .onboard-slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 32px; text-align: center;
      opacity: 0; transform: translateX(100%);
      transition: all 0.4s ease;
    }
    .onboard-slide.active { opacity: 1; transform: none; }
    .onboard-slide.prev { opacity: 0; transform: translateX(-100%); }
    .onboard-emoji { font-size: 100px; margin-bottom: 32px; filter: drop-shadow(0 8px 24px rgba(255,107,0,0.3)); }
    .onboard-title { font-size: 28px; font-weight: 700; margin-bottom: 16px; line-height: 1.3; }
    .onboard-title span { color: var(--orange); }
    .onboard-desc { color: var(--text2); line-height: 1.7; font-size: 15px; max-width: 320px; }
    .onboard-dots { display: flex; gap: 8px; justify-content: center; padding: 24px; }
    .dot { width: 8px; height: 8px; border-radius: 99px; background: var(--border); transition: all 0.3s; }
    .dot.active { width: 24px; background: var(--orange); }
    .onboard-footer { padding: 0 24px 40px; display: flex; gap: 12px; }

    /* ── BUTTONS ── */
    .btn {
      flex: 1; padding: 16px; border: none; border-radius: var(--radius);
      font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 15px;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: linear-gradient(135deg, var(--orange), var(--orange-light)); color: white; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,107,0,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost { background: var(--card); color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); background: var(--bg3); }
    .btn-teal { background: linear-gradient(135deg, var(--teal), #00B894); color: var(--navy); }
    .btn-danger { background: linear-gradient(135deg, var(--error), #DC2626); color: white; }
    .btn-full { width: 100%; flex: none; }
    .btn-sm { padding: 10px 16px; font-size: 13px; border-radius: var(--radius-sm); }
    .btn-icon { width: 48px; height: 48px; padding: 0; flex: none; border-radius: 50%; }

    /* ── LOGIN ── */
    #login { background: var(--bg); padding: 0; }
    .login-header {
      padding: 60px 24px 32px;
      background: linear-gradient(180deg, var(--bg2) 0%, transparent 100%);
    }
    .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .login-logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .login-logo-text { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 22px; }
    .login-logo-text span { color: var(--orange); }
    .login-title { font-size: 28px; font-weight: 700; line-height: 1.3; }
    .login-subtitle { color: var(--text2); margin-top: 8px; }
    .login-body { flex: 1; padding: 0 24px 40px; }
    .login-methods { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .login-method {
      display: flex; align-items: center; gap: 14px;
      padding: 16px; border-radius: var(--radius);
      background: var(--card); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
      font-family: 'Poppins', sans-serif; font-weight: 500;
    }
    .login-method:hover { border-color: var(--orange); background: rgba(255,107,0,0.05); }
    .login-method-icon { font-size: 22px; width: 36px; text-align: center; }
    .login-divider { display: flex; align-items: center; gap: 12px; color: var(--text2); font-size: 13px; margin: 20px 0; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .input-group { margin-bottom: 16px; }
    .input-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; display: block; }
    .input-field {
      width: 100%; padding: 14px 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    .input-field:focus { border-color: var(--orange); }
    .input-field::placeholder { color: var(--text2); }
    .input-row { display: flex; gap: 8px; }

    /* ── ROLE SELECT ── */
    #roleselect { background: var(--bg); padding: 60px 24px 40px; }
    .role-cards { display: flex; flex-direction: column; gap: 16px; margin-top: 32px; }
    .role-card {
      padding: 24px; border-radius: var(--radius);
      border: 2px solid var(--border);
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 20px;
    }
    .role-card:hover, .role-card.selected { border-color: var(--orange); background: rgba(255,107,0,0.06); }
    .role-card-icon { font-size: 48px; }
    .role-card-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 18px; }
    .role-card-desc { color: var(--text2); font-size: 13px; margin-top: 4px; }

    /* ── HOME ── */
    #home { background: var(--bg); }
    .home-header {
      background: linear-gradient(180deg, var(--bg2) 0%, transparent 100%);
      padding: 52px 20px 20px;
    }
    .home-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .home-greeting { font-size: 13px; color: var(--text2); }
    .home-name { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 22px; margin-top: 2px; }
    .home-name span { color: var(--orange); }
    .notif-btn {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; position: relative;
    }
    .notif-dot {
      position: absolute; top: 8px; right: 8px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--orange); border: 2px solid var(--bg2);
    }
    /* SOS Button */
    .sos-btn {
      width: 100%; padding: 20px;
      background: linear-gradient(135deg, #EF4444, #DC2626);
      border-radius: 20px; border: none;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 8px 32px rgba(239,68,68,0.35);
      margin-bottom: 20px;
    }
    .sos-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(239,68,68,0.5); }
    .sos-btn:active { transform: translateY(0); }
    .sos-left { display: flex; align-items: center; gap: 14px; }
    .sos-icon-wrap {
      width: 52px; height: 52px; border-radius: 16px;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .sos-title { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 18px; color: white; }
    .sos-sub { color: rgba(255,255,255,0.75); font-size: 12px; margin-top: 2px; }
    .sos-arrow { font-size: 24px; color: white; opacity: 0.7; }

    /* Home sections */
    .home-body { flex: 1; padding: 0 20px; overflow-y: auto; padding-bottom: 90px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin: 24px 0 14px; }
    .section-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 16px; }
    .section-link { color: var(--orange); font-size: 13px; font-weight: 500; cursor: pointer; }

    /* Service grid */
    .service-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .service-item {
      background: var(--card); border-radius: var(--radius-sm);
      padding: 14px 8px; text-align: center;
      cursor: pointer; transition: all 0.2s;
      border: 1px solid var(--border);
    }
    .service-item:hover { border-color: var(--orange); transform: translateY(-2px); }
    .service-item:active { transform: translateY(0); }
    .service-emoji { font-size: 26px; margin-bottom: 6px; }
    .service-name { font-size: 10px; color: var(--text2); font-weight: 500; line-height: 1.3; }

    /* Promo banner */
    .promo-banner {
      background: linear-gradient(135deg, var(--orange) 0%, #FF8C38 50%, #FFB347 100%);
      border-radius: var(--radius); padding: 20px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .promo-text { font-family: 'Poppins', sans-serif; }
    .promo-badge { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; margin-bottom: 6px; display: inline-block; }
    .promo-title { font-size: 18px; font-weight: 700; }
    .promo-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .promo-emoji { font-size: 52px; }

    /* Mechanic cards */
    .mechanic-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .mechanic-scroll::-webkit-scrollbar { display: none; }
    .mechanic-card {
      min-width: 160px; background: var(--card);
      border-radius: var(--radius); padding: 16px;
      border: 1px solid var(--border); cursor: pointer;
      transition: all 0.2s; flex-shrink: 0;
    }
    .mechanic-card:hover { border-color: var(--orange); }
    .mechanic-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 10px;
    }
    .mechanic-name { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; }
    .mechanic-spec { color: var(--text2); font-size: 11px; margin-top: 2px; }
    .mechanic-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .rating { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; color: var(--warning); }
    .distance { font-size: 11px; color: var(--teal); font-weight: 500; }
    .verified-badge {
      background: rgba(0,212,170,0.15); color: var(--teal);
      font-size: 10px; font-weight: 600; padding: 2px 6px;
      border-radius: 99px; margin-top: 6px; display: inline-block;
    }

    /* ── EMERGENCY ── */
    #emergency { background: var(--bg); }
    .emergency-header {
      background: linear-gradient(180deg, rgba(239,68,68,0.15) 0%, transparent 100%);
      padding: 52px 20px 20px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; margin-bottom: 20px;
    }
    .emergency-title { font-size: 26px; font-weight: 700; }
    .emergency-sub { color: var(--text2); margin-top: 6px; }
    .emergency-body { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 100px; }
    .issue-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    .issue-item {
      background: var(--card); border-radius: var(--radius);
      padding: 18px; border: 2px solid var(--border);
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px;
    }
    .issue-item:hover, .issue-item.selected { border-color: var(--orange); background: rgba(255,107,0,0.08); }
    .issue-icon { font-size: 28px; }
    .issue-name { font-family: 'Poppins', sans-serif; font-weight: 500; font-size: 13px; line-height: 1.3; }

    /* Location box */
    .location-box {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; margin-bottom: 16px;
      border: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
    }
    .location-icon { font-size: 24px; }
    .location-text { flex: 1; }
    .location-label { font-size: 11px; color: var(--text2); font-weight: 500; }
    .location-value { font-weight: 600; font-size: 14px; margin-top: 2px; }
    .location-change { color: var(--orange); font-size: 12px; font-weight: 600; cursor: pointer; }

    /* Fare estimate */
    .fare-box {
      background: linear-gradient(135deg, rgba(255,107,0,0.1), rgba(255,140,56,0.05));
      border: 1px solid rgba(255,107,0,0.2);
      border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
    }
    .fare-label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .fare-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
    .fare-item { font-size: 13px; color: var(--text2); }
    .fare-amount { font-size: 13px; font-weight: 500; }
    .fare-total { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 10px; }
    .fare-total .fare-item { font-weight: 700; font-size: 15px; color: var(--text); }
    .fare-total .fare-amount { font-weight: 700; font-size: 18px; color: var(--orange); }

    /* ── TRACKING ── */
    #tracking { background: var(--bg); }
    .map-area {
      height: 280px; background: var(--bg2);
      position: relative; overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .map-bg {
      position: absolute; inset: 0;
      background: 
        linear-gradient(rgba(255,107,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,107,0,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .map-roads {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .map-pin-user {
      position: absolute; bottom: 80px; right: 100px;
      font-size: 32px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }
    .map-pin-mechanic {
      position: absolute; top: 80px; left: 80px;
      font-size: 32px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
      animation: mechanicMove 3s ease-in-out infinite alternate;
    }
    @keyframes mechanicMove {
      from { transform: translate(0,0); }
      to { transform: translate(30px, 20px); }
    }
    .map-route {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,107,0,0.1) 0%, transparent 70%);
    }
    .map-eta {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: var(--navy); border: 1px solid var(--orange);
      padding: 8px 20px; border-radius: 99px;
      font-family: 'Poppins', sans-serif; font-weight: 700;
      font-size: 14px; color: var(--orange); white-space: nowrap;
    }
    .tracking-body { flex: 1; padding: 20px; overflow-y: auto; }
    .tracking-status {
      background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(0,212,170,0.05));
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
    }
    .status-row { display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .status-text { font-weight: 600; color: var(--success); }
    .status-sub { color: var(--text2); font-size: 13px; margin-top: 4px; }
    .mechanic-info-card {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; margin-bottom: 16px;
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }
    .mechanic-info-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .mechanic-info-name { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 16px; }
    .mechanic-info-spec { color: var(--text2); font-size: 12px; margin-top: 2px; }
    .mechanic-info-actions { margin-left: auto; display: flex; gap: 8px; }
    .action-btn {
      width: 44px; height: 44px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; transition: all 0.2s;
    }
    .action-btn:hover { border-color: var(--orange); background: rgba(255,107,0,0.1); }
    .timeline { margin-top: 8px; }
    .timeline-item { display: flex; gap: 14px; padding: 10px 0; }
    .timeline-dot-wrap { display: flex; flex-direction: column; align-items: center; }
    .timeline-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg3); flex-shrink: 0; }
    .timeline-dot.done { background: var(--success); border-color: var(--success); }
    .timeline-dot.active { background: var(--orange); border-color: var(--orange); animation: blink 1s infinite; }
    .timeline-line { flex: 1; width: 2px; background: var(--b
